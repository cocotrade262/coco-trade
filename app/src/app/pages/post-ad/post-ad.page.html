<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Post coconut video</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="false" class="ion-padding postPage">
  <!-- Plain divs — ion-card/ion-card-content can flex-stretch children on mobile and trap touches -->
  <div class="postAdCard">
    <h2 class="postAdCard__title">Choose or record a video</h2>
    <p class="postAdCard__subtitle">Minimum duration: 30 seconds</p>

    <div class="pickRow" [class.pickRow--disabled]="busy">
      <input
        type="file"
        accept="video/*"
        capture="environment"
        class="pickRow__input"
        [disabled]="busy"
        (change)="onFileSelected($event)"
        aria-label="Record video with camera"
      />
      <div class="pickRow__face" aria-hidden="true">
        <span class="pickRow__title">Record video (camera)</span>
        <span class="pickRow__sub">Opens camera when supported</span>
      </div>
    </div>

    <div class="pickRow" [class.pickRow--disabled]="busy">
      <input
        type="file"
        accept="video/*"
        class="pickRow__input"
        [disabled]="busy"
        (change)="onFileSelected($event)"
        aria-label="Select video file from device"
      />
      <div class="pickRow__face" aria-hidden="true">
        <span class="pickRow__title">Select video file</span>
        <span class="pickRow__sub">Pick from your device / laptop</span>
      </div>
    </div>

    <div class="preview" *ngIf="selectedObjectUrl">
      <video class="preview__video" [src]="selectedObjectUrl" controls playsinline></video>
      <div class="preview__meta">
        Duration: {{ durationSec | number: '1.0-0' }}s
      </div>
    </div>

    <div class="caption-field">
      <label class="caption-field__label" for="postCaption">Caption (optional)</label>
      <ion-textarea
        id="postCaption"
        class="caption-field__input"
        [(ngModel)]="caption"
        [rows]="4"
        placeholder="Ex: Fresh coconuts available in my area"
        autocapitalize="sentences"
        enterkeyhint="done"
      ></ion-textarea>
    </div>

    <ion-button
      type="button"
      color="success"
      expand="block"
      (click)="publish()"
      [disabled]="busy || !selectedObjectUrl || (durationSec ?? 0) < 30"
    >
      Post to feed
    </ion-button>
  </div>
</ion-content>
