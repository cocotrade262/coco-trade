<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Post coconut video</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="false" class="ion-padding postPage">
  <div class="postAdCard">
    <h2 class="postAdCard__title">Choose or record a video</h2>
    <p class="postAdCard__subtitle">Minimum duration: 30 seconds</p>

    <input
      #cameraInput
      type="file"
      accept="video/*"
      capture="environment"
      class="postAd-fileInput"
      [disabled]="busy"
      (change)="onFileSelected($event)"
      aria-label="Record video with camera"
      tabindex="-1"
    />

    <button
      type="button"
      class="postAd-btn postAd-btn--primary"
      [disabled]="busy"
      (click)="cameraInput.click()"
    >
      <span class="postAd-btn__stack">
        <span class="postAd-btn__title">Record video (camera)</span>
        <span class="postAd-btn__sub">Opens camera when supported</span>
      </span>
    </button>

    <input
      #fileInput
      type="file"
      accept="video/*"
      class="postAd-fileInput"
      [disabled]="busy"
      (change)="onFileSelected($event)"
      aria-label="Select video file from device"
      tabindex="-1"
    />

    <button
      type="button"
      class="postAd-btn postAd-btn--primary"
      [disabled]="busy"
      (click)="fileInput.click()"
    >
      <span class="postAd-btn__stack">
        <span class="postAd-btn__title">Select video file</span>
        <span class="postAd-btn__sub">Pick from your device / laptop</span>
      </span>
    </button>

    <div class="preview" *ngIf="selectedObjectUrl">
      <video class="preview__video" [src]="selectedObjectUrl" controls playsinline></video>
      <div class="preview__meta">Duration: {{ durationSec | number: '1.0-0' }}s</div>
    </div>

    <ion-item lines="none" class="caption-field">
      <ion-label position="stacked">Caption (optional)</ion-label>
      <ion-textarea
        class="caption-field__input"
        [(ngModel)]="caption"
        [rows]="4"
        placeholder="Ex: Fresh coconuts available in my area"
        autocapitalize="sentences"
        enterkeyhint="done"
        aria-label="Caption (optional)"
      ></ion-textarea>
    </ion-item>

    <button
      type="button"
      class="postAd-btn postAd-btn--success"
      (click)="publish()"
      [disabled]="busy || !selectedObjectUrl || (durationSec ?? 0) < 30"
    >
      Post to feed
    </button>
  </div>
</ion-content>
