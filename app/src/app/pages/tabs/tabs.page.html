<!--
  Plain flex shell instead of ion-tabs: ion-tabs + slot layout often leaves a huge empty band
  above tab content on Android WebView when the main slot isn’t ion-router-outlet.
-->
<div class="tabsShell">
  <div class="tabs-outlet">
    <app-video-feed *ngIf="activeTab === 'feed'"></app-video-feed>
    <app-post-ad *ngIf="activeTab === 'post'"></app-post-ad>
    <app-account *ngIf="activeTab === 'account'"></app-account>
  </div>

  <nav class="customTabBar" role="navigation" aria-label="Main navigation">
    <a
      class="customTabBar__link"
      [routerLink]="['/tabs', 'feed']"
      routerLinkActive="customTabBar__link--active"
      [routerLinkActiveOptions]="{ exact: false }"
    >
      <ion-icon name="play-circle-outline" aria-hidden="true"></ion-icon>
      <span class="customTabBar__label">Feed</span>
    </a>
    <a
      class="customTabBar__link"
      [routerLink]="['/tabs', 'post']"
      routerLinkActive="customTabBar__link--active"
      [routerLinkActiveOptions]="{ exact: false }"
    >
      <ion-icon name="add-circle-outline" aria-hidden="true"></ion-icon>
      <span class="customTabBar__label">Post</span>
    </a>
    <a
      class="customTabBar__link"
      [routerLink]="['/tabs', 'account']"
      routerLinkActive="customTabBar__link--active"
      [routerLinkActiveOptions]="{ exact: false }"
    >
      <ion-icon name="person-circle-outline" aria-hidden="true"></ion-icon>
      <span class="customTabBar__label">Account</span>
    </a>
  </nav>
</div>
