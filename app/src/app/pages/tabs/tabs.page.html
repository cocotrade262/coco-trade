<ion-tabs>
  <div class="tabs-outlet">
    <app-video-feed *ngIf="activeTab === 'feed'"></app-video-feed>
    <app-post-ad *ngIf="activeTab === 'post'"></app-post-ad>
    <app-account *ngIf="activeTab === 'account'"></app-account>
  </div>

  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="feed" [routerLink]="['/tabs/feed']">
      <ion-icon name="play-circle-outline"></ion-icon>
      <ion-label>Feed</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="post" [routerLink]="['/tabs/post']">
      <ion-icon name="add-circle-outline"></ion-icon>
      <ion-label>Post</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="account" [routerLink]="['/tabs/account']">
      <ion-icon name="person-circle-outline"></ion-icon>
      <ion-label>Account</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
